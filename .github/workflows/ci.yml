# ──────────────────────────────────────────────────────────
#  CI Pipeline — runs on every branch + PRs to main
#  Blocks merges if TypeScript or build fails
# ──────────────────────────────────────────────────────────
name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true  # cancel older runs on same branch

jobs:
  type-check-and-build:
    name: TypeScript + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          DIST_SIZE=$(du -sh dist/ | cut -f1)
          echo "## 📦 Bundle size: $DIST_SIZE" >> $GITHUB_STEP_SUMMARY

  # ── Preview deploy info ──────────────────────────────────
  deploy-preview:
    name: Deploy Preview (info)
    runs-on: ubuntu-latest
    needs: type-check-and-build
    if: github.event_name == 'pull_request'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **CI passed** — Build succeeded. Vercel will deploy a preview automatically.'
            })
