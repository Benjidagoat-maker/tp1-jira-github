name: Auto Tag Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # ← ESSENTIEL : récupère tous les tags

      - name: Get latest tag and bump patch
        id: version
        run: |
          # Chercher le dernier tag sémantique vX.Y.Z
          LATEST=$(git tag -l "v*.*.*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.0.1"
          else
            # Extraire les composants de façon sécurisée
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "latest=$LATEST"
          echo "new_tag=$NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}
          echo "✓ Tag créé : ${{ steps.version.outputs.new_tag }}"
